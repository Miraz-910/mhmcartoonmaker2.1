<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cartoon Maker - Miraz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 15px; border-radius: 10px; border: none; margin-bottom: 20px; font-size: 16px; background: #334155; color: white; }
        button { background: #3b82f6; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; }
        button:hover { background: #2563eb; }
        button:disabled { background: #64748b; cursor: not-allowed; }
        #output-section { margin-top: 30px; display: none; }
        #resultImage { width: 100%; border-radius: 15px; border: 3px solid #3b82f6; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .loader { display: none; margin: 20px 0; color: #60a5fa; font-style: italic; }
        .download-btn { background: #10b981; margin-top: 15px; display: inline-block; text-decoration: none; padding: 12px; border-radius: 10px; color: white; width: 90%; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎨 AI Cartoon Maker</h2>
        <p>আপনার আইডিয়াটি ইংরেজিতে লিখুন:</p>
        
        <input type="text" id="promptInput" placeholder="যেমন: A cute robot in a forest, 3d cartoon...">
        <button id="generateBtn">কার্টুন তৈরি করুন</button>

        <div class="loader" id="loader">✨ এআই আপনার কার্টুনটি তৈরি করছে... ১০ সেকেন্ড অপেক্ষা করুন।</div>

        <div id="output-section">
            <h3>আপনার রেজাল্ট:</h3>
            <img id="resultImage" src="" alt="AI Cartoon">
            <a id="downloadLink" href="#" download="my_cartoon.png" class="download-btn">📥 ডাউনলোড করুন</a>
        </div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const outputSection = document.getElementById('output-section');
        const resultImage = document.getElementById('resultImage');
        const downloadLink = document.getElementById('downloadLink');

        generateBtn.addEventListener('click', async () => {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return alert("দয়া করে কিছু লিখুন!");

            // UI আপডেট
            loader.style.display = "block";
            generateBtn.disabled = true;
            generateBtn.innerText = "প্রসেসিং...";
            outputSection.style.display = "none";

            try {
                const response = await fetch("/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (!response.ok) throw new Error("সার্ভার রেসপন্স দিচ্ছে না। আবার চেষ্টা করুন।");

                const blob = await response.blob();
                const imageUrl = URL.createObjectURL(blob);

                resultImage.src = imageUrl;
                downloadLink.href = imageUrl;
                outputSection.style.display = "block";

            } catch (error) {
                alert("এরর: " + error.message);
            } finally {
                loader.style.display = "none";
                generateBtn.disabled = false;
                generateBtn.innerText = "কার্টুন তৈরি করুন";
            }
        });
    </script>
</body>
</html>
