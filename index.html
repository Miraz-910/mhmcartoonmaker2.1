<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wan 2.1 AI Cartoon Maker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: #16213e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 80%; padding: 12px; border-radius: 5px; border: none; outline: none; margin-bottom: 15px; font-size: 16px; }
        button { background: #e94560; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #ff2e63; }
        #video-output { margin-top: 30px; display: none; }
        video { width: 100%; border-radius: 10px; border: 2px solid #e94560; }
        .loading { display: none; margin-top: 20px; color: #00d2ff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Wan 2.1 AI Cartoon Maker</h2>
        <p>আপনার কার্টুন আইডিয়াটি নিচে লিখুন:</p>
        
        <input type="text" id="promptInput" placeholder="যেমন: A funny monkey dancing, 3D cartoon style...">
        <br>
        <button id="generateBtn">ভিডিও তৈরি করুন</button>

        <div class="loading" id="loader">এআই আপনার ভিডিওটি তৈরি করছে... (১-২ মিনিট সময় লাগতে পারে)</div>

        <div id="video-output">
            <h3>আপনার ভিডিও তৈরি:</h3>
            <video id="resultVideo" controls></video>
            <br><br>
            <a id="downloadBtn" href="#" download="cartoon_video.mp4">
                <button style="background: #0f3460;">ডাউনলোড করুন</button>
            </a>
        </div>
    </div>

    <script>
        generateBtn.addEventListener('click', async () => {
    const prompt = document.getElementById('promptInput').value;
    if (!prompt) return alert("কিছু লিখুন!");

    loader.style.display = "block";
    generateBtn.disabled = true;
    outputDiv.style.display = "none";

    try {
        // সরাসরি HF কল না করে আমাদের /api/generate কল করছি
        const response = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: prompt })
        });

        if (!response.ok) throw new Error("ভিডিও তৈরি করতে সমস্যা হয়েছে। আবার চেষ্টা করুন।");

        const blob = await response.blob();
        const videoUrl = URL.createObjectURL(blob);

        videoPlayer.src = videoUrl;
        downloadBtn.href = videoUrl;
        outputDiv.style.display = "block";

    } catch (error) {
        alert(error.message);
    } finally {
        loader.style.display = "none";
        generateBtn.disabled = false;
    }
});
    </script>
</body>
  </html>
